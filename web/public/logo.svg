<?xml version="1.0" encoding="UTF-8"?>
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1F3A"/>
      <stop offset="100%" stop-color="#0E2F5A"/>
    </linearGradient>

    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#F5D76E"/>
    </linearGradient>
  </defs>

  <!-- Fondo -->
  <rect x="16" y="16" width="224" height="224" rx="40" fill="url(#bg)"/>

  <!-- Techo clásico banco -->
  <polygon points="128,60 70,95 186,95"
           fill="url(#gold)"/>

  <!-- Columnas -->
  <rect x="88" y="95" width="16" height="70" rx="4" fill="url(#gold)"/>
  <rect x="120" y="95" width="16" height="70" rx="4" fill="url(#gold)"/>
  <rect x="152" y="95" width="16" height="70" rx="4" fill="url(#gold)"/>

  <!-- Base -->
  <rect x="78" y="165" width="100" height="14" rx="4" fill="url(#gold)"/>

  <!-- Línea de crecimiento sutil -->
  <polyline points="80,145 110,130 135,140 175,110"
            fill="none"
            stroke="#4FD1C5"
            stroke-width="6"
            stroke-linecap="round"
            stroke-linejoin="round"/>

</svg>